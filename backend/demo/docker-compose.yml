version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ducanh2004
      MYSQL_DATABASE: testing

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  springboot:
    build: .
    container_name: springboot-app
    restart: always

    depends_on:
      - mysql

    ports:
      - "8080:8080"

volumes:
  mysql_data: